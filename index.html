<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #bg-video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Ensures the video covers the whole screen */
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <!-- Video Element -->
    <video id="bg-video" src="video.mp4" playsinline></video>

    <script>
        const video = document.getElementById('bg-video');

        // Attempt to play as soon as the page loads
        window.onload = () => {
            video.play().catch(error => {
                console.log("Autoplay prevented. User interaction required.");
            });

            // Request full screen
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) { /* Safari */
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) { /* IE11 */
                video.msRequestFullscreen();
            }
        };

        // Unmute once the video actually starts playing
        video.onplaying = () => {
            video.muted = false; 
        };
    </script>
</body>
</html>
